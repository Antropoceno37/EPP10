name: R unit tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install test dependencies
        shell: Rscript {0}
        run: |
          install.packages(c(
            "testthat", "dplyr", "tidyr", "purrr", "tibble", "stringr"
          ))

      - name: Show R session info (for diagnostics)
        shell: Rscript {0}
        run: |
          cat("R version:", R.version.string, "\n")
          cat("Working directory:", getwd(), "\n")
          cat("Loaded packages:\n")
          print(installed.packages()[
            c("testthat", "dplyr", "tidyr", "purrr", "tibble", "stringr"),
            "Version", drop = FALSE])

      - name: Run testthat suite
        run: Rscript tests/testthat.R
